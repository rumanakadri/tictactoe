<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <script src="script.js" defer></script> 
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main>
    <h1>Tic Tac Toe</h1>
    <h2 id="player-turn">X's turn</h2>
    <div id = "container">
        <table id="inputTable">
            <tr>
                <td class="cell" cellIndex="0"></td>
                <td class="cell" cellIndex="1"></td>
                <td class="cell" cellIndex="2"></td>
            </tr>
            <tr>
                <td class="cell" cellIndex="3"></td>
                <td class="cell" cellIndex="4"></td>
                <td class="cell" cellIndex="5"></td>
            </tr>
            <tr>
                <td class="cell" cellIndex="6"></td>
                <td class="cell" cellIndex="7"></td>
                <td class="cell" cellIndex="8"></td>
            </tr>
        </table>
        <div id = "winnerDetails">
            
        </div>
        <div>
            <button id="reset">Reset</button>
        </div>
    </div>
    </main>
</body>
</html>
